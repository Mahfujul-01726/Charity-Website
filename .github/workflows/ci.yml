name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server deps
        run: npm ci --prefix server

      - name: Install client deps
        run: npm ci --prefix client

      - name: Build client
        run: npm run build --prefix client

      - name: Server smoke import
        run: node --input-type=module -e "import('./server/src/app.js').then(()=>console.log('server import ok')).catch(e=>{ console.error(e); process.exit(1) })"
